name: Test AI Filter (End-to-End)

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers to analyze (e.g. AAPL,NVDA,TSLA)"
        required: true
        default: "NVDA,MSFT,TSLA,SMCI"
      dry_run_note:
        description: "Optional note about this test run (for your own reference)"
        required: false
        default: ""

jobs:
  test_ai_filter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt','punkt_tab','averaged_perceptron_tagger','averaged_perceptron_tagger_eng']:
              try: nltk.download(pkg, quiet=True)
              except: pass
          "

      - name: Create data and reports directories
        run: mkdir -p data logs reports

      - name: Run end-to-end AI filter test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          TICKERS:           ${{ github.event.inputs.tickers }}
          DRY_RUN_NOTE:      ${{ github.event.inputs.dry_run_note }}
        run: |
          python - <<'PYEOF'
          import os, sys, json, logging
          from pathlib import Path
          from datetime import datetime

          logging.basicConfig(level=logging.INFO, format="%(levelname)s | %(name)s | %(message)s")
          logger = logging.getLogger("e2e_test")

          # ── Point DB at a test copy ───────────────────────────────────────────
          TEST_DB = Path("data/test_trades.db")
          import bot.logger as _log_mod
          _log_mod.DB_PATH = TEST_DB

          from bot.scorer     import score_ticker
          from bot.strategies import classify_strategy
          from bot.ai_filter  import apply_ai_opinion, run_ai_filter_batch
          from bot.indicators import get_indicators
          from bot.news       import get_news_sentiment
          from bot.logger     import log_trade, init_db

          init_db()

          # ── Parse tickers from workflow input ─────────────────────────────────
          raw = os.environ.get("TICKERS", "NVDA,MSFT,TSLA")
          tickers = [t.strip().upper() for t in raw.split(",") if t.strip()]
          note    = os.environ.get("DRY_RUN_NOTE", "")

          print("\n" + "="*70)
          print(f"  MONEYPRINTER END-TO-END TEST")
          print(f"  Tickers : {', '.join(tickers)}")
          if note:
              print(f"  Note    : {note}")
          print(f"  Time    : {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}")
          print("="*70)

          macro = {
              "spy_regime":     "bull",
              "vix":            15.0,
              "vix_multiplier": 1.0,
              "bearish_market": False,
          }
          NEWS_API_KEY = os.environ.get("NEWS_API_KEY", "")

          # ─────────────────────────────────────────────────────────────────────
          # STEP 1: Fetch real indicators + news for each ticker
          # ─────────────────────────────────────────────────────────────────────
          print("\n" + "="*70)
          print("  STEP 1: FETCHING LIVE INDICATORS & NEWS")
          print("="*70)

          ticker_data = {}
          for ticker in tickers:
              print(f"\n  Fetching {ticker}...")
              try:
                  ind = get_indicators(ticker)
                  if ind.get("error"):
                      print(f"  ⚠  {ticker}: indicator error — {ind['error']} (skipping)")
                      continue
                  price = ind.get("current_price", 0)
                  rsi   = ind.get("rsi", 0)
                  print(f"     Price: ${price:.2f}  RSI: {rsi:.1f}  "
                        f"Vol ratio: {ind.get('volume_ratio', 0):.2f}x  "
                        f"Intraday: {ind.get('intraday_move_pct', 0):.1f}%")
              except Exception as e:
                  print(f"  ⚠  {ticker}: indicator fetch failed — {e} (skipping)")
                  continue

              try:
                  news = get_news_sentiment(ticker, ticker, api_key=NEWS_API_KEY)
                  hcount = news.get("headline_count", 0)
                  pol    = news.get("avg_polarity", 0)
                  print(f"     News: {hcount} headlines  polarity={pol:+.2f}  "
                        f"bull_boost={news.get('bull_keyword_boost',0)}  "
                        f"bear_boost={news.get('bear_keyword_boost',0)}")
                  if news.get("top_headlines"):
                      for h in news["top_headlines"][:2]:
                          print(f"       → {h['text'][:100]}")
              except Exception as e:
                  print(f"     News fetch failed: {e}")
                  news = {}

              ticker_data[ticker] = {"ind": ind, "news": news}

          if not ticker_data:
              print("\n  ❌ No tickers could be fetched. Exiting.")
              sys.exit(1)

          # ─────────────────────────────────────────────────────────────────────
          # STEP 2: Score each ticker
          # ─────────────────────────────────────────────────────────────────────
          print("\n" + "="*70)
          print("  STEP 2: SCORING ALL TICKERS")
          print("="*70)

          scored_pairs = []
          for ticker, data in ticker_data.items():
              ind  = data["ind"]
              news = data["news"]
              try:
                  score = score_ticker(ticker, ind, news, macro)
                  score = classify_strategy(score, ind)
                  score["_indicators"] = ind
                  score["_news"]       = news
                  action = score.get("action", "hold")
                  net    = score.get("net_score", 0)
                  conf   = score.get("confidence", 0.0)
                  strat  = score.get("strategy", "?")
                  print(f"\n  {ticker}")
                  print(f"    Scorer  → {action.upper():5s}  net={net:+d}  conf={conf:.2f}  strategy={strat}")
                  print(f"    For:      {score.get('signals_triggered', [])}")
                  print(f"    Against:  {score.get('signals_against', [])}")
                  print(f"    Reason:   {score.get('reasoning','')[:120]}")
                  scored_pairs.append((score, ind))
              except Exception as e:
                  print(f"  ⚠  {ticker}: scoring failed — {e}")

          # ─────────────────────────────────────────────────────────────────────
          # STEP 3: Claude second-opinion on ALL tickers (parallel)
          # ─────────────────────────────────────────────────────────────────────
          print("\n" + "="*70)
          print("  STEP 3: CLAUDE SECOND OPINION (parallel, all tickers)")
          print("="*70)

          updated_scores = run_ai_filter_batch(scored_pairs)

          # ─────────────────────────────────────────────────────────────────────
          # STEP 4: Final decisions + trade logging
          # ─────────────────────────────────────────────────────────────────────
          print("\n" + "="*70)
          print("  STEP 4: FINAL DECISIONS & TRADE LOG")
          print("="*70)

          confirmed_trades = []
          for score in updated_scores:
              ticker       = score.get("ticker", "?")
              action       = score.get("action", "hold")
              confidence   = score.get("confidence", 0.0)
              strategy     = score.get("strategy", "?")
              ai_confirmed = score.get("ai_confirmed")
              ai_reasoning = score.get("ai_reasoning", "")
              net          = score.get("net_score", 0)
              ind          = score.get("_indicators", {})

              # Re-apply confidence/strategy gate after AI may have changed action
              if action == "buy" and (confidence < 0.65 or strategy == "mixed"):
                  action = "hold"
                  score["action"] = "hold"
              elif action in ("short", "sell") and confidence < 0.70:
                  action = "hold"
                  score["action"] = "hold"

              ai_label = "✅ CONFIRMED" if ai_confirmed else ("❌ REJECTED" if ai_confirmed is False else "⏭  SKIPPED")
              print(f"\n  {ticker}")
              print(f"    Final action : {action.upper()}")
              print(f"    AI verdict   : {ai_label}")
              print(f"    AI reasoning : {ai_reasoning}")

              if action == "hold":
                  print(f"    → No trade placed")
                  continue

              entry_price = ind.get("current_price", 0) or score.get("entry_price", 0)
              if not entry_price:
                  print(f"    → No price available, skipping log")
                  continue

              shares   = max(1, int(5000 / entry_price))
              order_id = f"test-{ticker.lower()}-{datetime.utcnow().strftime('%H%M%S')}"

              trade_id = log_trade(
                  session="test",
                  ticker=ticker,
                  action=action,
                  strategy=strategy,
                  time_horizon="swing",
                  quantity=shares,
                  entry_price=entry_price,
                  limit_price=round(entry_price + 0.03, 2),
                  stop_loss=score.get("stop_loss"),
                  take_profit=score.get("take_profit"),
                  confidence=confidence,
                  net_score=net,
                  bull_score=score.get("bull_score", 0),
                  bear_score=score.get("bear_score", 0),
                  signals_triggered=score.get("signals_triggered", []),
                  signals_against=score.get("signals_against", []),
                  reasoning=score.get("reasoning", ""),
                  risk_reward=score.get("risk_reward", 2.5),
                  macro_bias=macro["spy_regime"],
                  vix_level=macro["vix"],
                  alpaca_order_id=order_id,
                  status="dry_run",
                  ai_confirmed=ai_confirmed,
                  ai_reasoning=ai_reasoning,
              )
              print(f"    → Trade logged  db_id={trade_id}  qty={shares}  entry=${entry_price:.2f}")
              confirmed_trades.append({"ticker": ticker, "trade_id": trade_id,
                                       "entry": entry_price, "qty": shares, "action": action})

          # ─────────────────────────────────────────────────────────────────────
          # STEP 5: Write all decisions to live_feed.json
          # ─────────────────────────────────────────────────────────────────────
          print("\n" + "="*70)
          print("  STEP 5: WRITING LIVE FEED")
          print("="*70)

          from bot.live_feed import write_live_feed
          write_live_feed(updated_scores, "test")
          print(f"  data/live_feed.json updated")

          # ─────────────────────────────────────────────────────────────────────
          # Summary
          # ─────────────────────────────────────────────────────────────────────
          print("\n" + "="*70)
          print("  SUMMARY")
          print("="*70)
          print(f"  Tickers analyzed : {len(ticker_data)}")
          print(f"  Trades placed    : {len(confirmed_trades)}")
          for t in confirmed_trades:
              print(f"    {t['action'].upper():5s} {t['ticker']:6s}  qty={t['qty']}  "
                    f"entry=${t['entry']:.2f}  db_id={t['trade_id']}")
          skipped = [tk for tk in ticker_data if tk not in [t["ticker"] for t in confirmed_trades]]
          for tk in skipped:
              print(f"    HOLD  {tk:6s}  (filtered by scorer or Claude)")
          print("\n  View results on the dashboard after this run commits the feed.")
          print()
          PYEOF

      - name: Commit live feed to main
        run: |
          git config user.name  "trading-bot"
          git config user.email "bot@trading.local"
          git pull --rebase origin main || true
          git add data/live_feed.json || true
          git diff --staged --quiet || git commit -m "test: live feed update [skip ci]"
          git push || true
