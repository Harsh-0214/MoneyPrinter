name: Pre-Market Scan

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 9:00 AM EDT (UTC-4). Nov-Mar EST: change to '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data for TextBlob
        run: python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('averaged_perceptron_tagger', quiet=True)"

      - name: Run pre-market session
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:   https://paper-api.alpaca.markets
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          DRY_RUN:           ${{ vars.DRY_RUN || 'false' }}
        run: python main.py --session premarket

      - name: Commit trade log
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading.local"
          git add data/trades.db logs/ || true
          git diff --staged --quiet || git commit -m "bot: update trade log [skip ci]"
          git pull --rebase origin main || true
          git push
