name: Pre-Market (09:00 ET, waits in-job)

# Scheduled early because GitHub cron is best-effort; the job waits until
# exactly 09:00 ET. 10:31 UTC = 06:31 ET in EDT / 05:31 ET in EST.
on:
  schedule:
    - cron: "31 10 * * 1-5"
  workflow_dispatch:

concurrency:
  group: premarket
  cancel-in-progress: false

jobs:
  premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt', 'punkt_tab', 'averaged_perceptron_tagger', 'averaged_perceptron_tagger_eng']:
              try: nltk.download(pkg, quiet=True)
              except: pass
          "

      - name: Wait until 09:00 ET
        id: wait
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual dispatch — running immediately."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TARGET_MIN=$(( 9 * 60 ))        # 09:00 ET
          CUTOFF_MIN=$(( 15 * 60 ))       # too late to matter
          while :; do
            H=$(TZ=America/New_York date +%-H); M=$(TZ=America/New_York date +%-M)
            NOW=$(( H * 60 + M ))
            if [ "$NOW" -ge "$CUTOFF_MIN" ]; then
              echo "Past cutoff (now $H:$M ET) — skipping."
              echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
            fi
            if [ "$NOW" -ge "$TARGET_MIN" ]; then
              printf 'Target reached: %02d:%02d ET — proceeding.\n' "$H" "$M"
              echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
            fi
            sleep 30
          done

      - name: Create data directory
        if: steps.wait.outputs.proceed == 'true'
        run: mkdir -p data logs

      - name: Run pre-market session
        if: steps.wait.outputs.proceed == 'true'
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:   https://paper-api.alpaca.markets
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN:           ${{ vars.DRY_RUN || 'false' }}
        run: python main.py --session premarket

      - name: Commit trade log
        if: steps.wait.outputs.proceed == 'true'
        shell: bash
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading.local"
          mkdir -p /tmp/botstate
          for f in discovered_tickers.json data/trades.db data/live_feed.json; do
            [ -f "$f" ] && cp "$f" "/tmp/botstate/$(basename "$f")"
          done
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for f in discovered_tickers.json data/trades.db data/live_feed.json; do
              b="/tmp/botstate/$(basename "$f")"
              [ -f "$b" ] && cp "$b" "$f"
            done
            git add discovered_tickers.json data/trades.db data/live_feed.json || true
            if git diff --staged --quiet; then echo "No changes."; exit 0; fi
            git commit -m "bot: premarket trade log [skip ci]"
            if git push origin HEAD:main; then echo "Pushed."; exit 0; fi
            echo "Push failed — retry $i"; sleep $(( i * 5 ))
          done
          echo "::error::Failed to push premarket state after 5 attempts"
          exit 1
