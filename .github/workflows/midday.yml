name: Midday — Stop/Target Check

on:
  schedule:
    - cron: '0 16 * * 1-5'   # 12:00 PM EDT (UTC-4)
  workflow_dispatch:

jobs:
  midday:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt', 'punkt_tab', 'averaged_perceptron_tagger', 'averaged_perceptron_tagger_eng']:
              try: nltk.download(pkg, quiet=True)
              except: pass
          "

      - name: Create data directory
        run: mkdir -p data logs

      - name: Run midday session
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:   https://paper-api.alpaca.markets
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN:           ${{ vars.DRY_RUN || 'false' }}
        run: python main.py --session midday

      - name: Commit trade log
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading.local"
          git pull --rebase origin main || true
          git add data/trades.db || true
          git diff --staged --quiet || git commit -m "bot: midday trade log [skip ci]"
          git push || true
