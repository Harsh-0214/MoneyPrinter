name: Discovery (08:30 ET, waits in-job)

# GitHub cron is best-effort (delays of hours are normal), so we schedule
# well BEFORE the target and the job waits until exactly 08:30 ET.
# 10:23 UTC = 06:23 ET in EDT / 05:23 ET in EST — the wait loop absorbs DST.
on:
  schedule:
    - cron: "23 10 * * 1-5"
  workflow_dispatch:

concurrency:
  group: discovery
  cancel-in-progress: false

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt', 'punkt_tab', 'averaged_perceptron_tagger', 'averaged_perceptron_tagger_eng']:
              try: nltk.download(pkg, quiet=True)
              except: pass
          "

      - name: Wait until 08:30 ET
        id: wait
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual dispatch — running immediately."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TARGET_MIN=$(( 8 * 60 + 30 ))   # 08:30 ET
          CUTOFF_MIN=$(( 15 * 60 ))       # past 15:00 ET discovery is pointless
          while :; do
            H=$(TZ=America/New_York date +%-H); M=$(TZ=America/New_York date +%-M)
            NOW=$(( H * 60 + M ))
            if [ "$NOW" -ge "$CUTOFF_MIN" ]; then
              echo "Past cutoff (now $H:$M ET) — skipping."
              echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
            fi
            if [ "$NOW" -ge "$TARGET_MIN" ]; then
              printf 'Target reached: %02d:%02d ET — proceeding.\n' "$H" "$M"
              echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
            fi
            sleep 30
          done

      - name: Create data directory
        if: steps.wait.outputs.proceed == 'true'
        run: mkdir -p data logs

      - name: Run discovery
        if: steps.wait.outputs.proceed == 'true'
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:   https://paper-api.alpaca.markets
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN:           "false"
        run: python main.py --session discovery

      - name: Commit discovered tickers
        if: steps.wait.outputs.proceed == 'true'
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/botstate
          for f in discovered_tickers.json data/trades.db data/live_feed.json; do
            [ -f "$f" ] && cp "$f" "/tmp/botstate/$(basename "$f")"
          done
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for f in discovered_tickers.json data/trades.db data/live_feed.json; do
              b="/tmp/botstate/$(basename "$f")"
              [ -f "$b" ] && cp "$b" "$f"
            done
            git add discovered_tickers.json data/trades.db data/live_feed.json || true
            if git diff --staged --quiet; then echo "No changes."; exit 0; fi
            git commit -m "chore: update discovered_tickers [skip ci]"
            if git push origin HEAD:main; then echo "Pushed."; exit 0; fi
            echo "Push failed — retry $i"; sleep $(( i * 5 ))
          done
          echo "::error::Failed to push discovery state after 5 attempts"
          exit 1
