name: Discovery (8:30 AM EST)

on:
  schedule:
    - cron: "30 13 * * 1-5"   # 8:30 AM EST (UTC-5)
  workflow_dispatch:

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt', 'punkt_tab', 'averaged_perceptron_tagger', 'averaged_perceptron_tagger_eng']:
              try: nltk.download(pkg, quiet=True)
              except: pass
          "

      - name: Create data directory
        run: mkdir -p data logs

      - name: Run discovery
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:   https://paper-api.alpaca.markets
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN:           "false"
        run: python main.py --session discovery

      - name: Commit discovered tickers
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add discovered_tickers.json data/trades.db data/live_feed.json || true
          git diff --staged --quiet || git commit -m "chore: update discovered_tickers [skip ci]"
          git push || true
