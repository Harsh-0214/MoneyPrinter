name: Discovery (08:30 ET, DST-safe)

on:
  schedule:
    - cron: "30 12 * * 1-5"   # 08:30 ET during EDT (UTC-4)
    - cron: "30 13 * * 1-5"   # 08:30 ET during EST (UTC-5)
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual/dispatch run — proceeding regardless of time."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TARGET_MIN=510        # 08:30 America/New_York (minutes since midnight)
          TOLERANCE=20          # minutes of GitHub scheduling delay to tolerate
          H=$(TZ=America/New_York date +%-H)
          M=$(TZ=America/New_York date +%-M)
          NOW_MIN=$(( H * 60 + M ))
          DIFF=$(( NOW_MIN - TARGET_MIN ))
          printf 'Eastern now %02d:%02d | diff %d min | tolerance %d\n' "$H" "$M" "$DIFF" "$TOLERANCE"
          if [ "$DIFF" -ge 0 ] && [ "$DIFF" -le "$TOLERANCE" ]; then
            echo "In window — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Out of window (wrong-season cron or delayed beyond tolerance) — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  discovery:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt', 'punkt_tab', 'averaged_perceptron_tagger', 'averaged_perceptron_tagger_eng']:
              try: nltk.download(pkg, quiet=True)
              except: pass
          "

      - name: Create data directory
        run: mkdir -p data logs

      - name: Run discovery
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:   https://paper-api.alpaca.markets
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN:           "false"
        run: python main.py --session discovery

      - name: Commit discovered tickers
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add discovered_tickers.json data/trades.db data/live_feed.json || true
          git diff --staged --quiet || git commit -m "chore: update discovered_tickers [skip ci]"
          git push || true
