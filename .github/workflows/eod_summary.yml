name: End of Day Summary (16:15 ET, waits in-job)

# Scheduled early because GitHub cron is best-effort; the job waits until
# exactly 16:15 ET. 18:07 UTC = 14:07 ET in EDT / 13:07 ET in EST.
on:
  schedule:
    - cron: "7 18 * * 1-5"
  workflow_dispatch:

concurrency:
  group: eod-summary
  cancel-in-progress: false

jobs:
  eod_summary:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt', 'punkt_tab', 'averaged_perceptron_tagger', 'averaged_perceptron_tagger_eng']:
              try: nltk.download(pkg, quiet=True)
              except: pass
          "

      - name: Wait until 16:15 ET
        id: wait
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual dispatch — running immediately."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TARGET_MIN=$(( 16 * 60 + 15 ))   # 16:15 ET
          while :; do
            H=$(TZ=America/New_York date +%-H); M=$(TZ=America/New_York date +%-M)
            NOW=$(( H * 60 + M ))
            if [ "$NOW" -ge "$TARGET_MIN" ]; then
              printf 'Target reached: %02d:%02d ET — proceeding.\n' "$H" "$M"
              echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
            fi
            sleep 30
          done

      - name: Create data directory
        if: steps.wait.outputs.proceed == 'true'
        run: mkdir -p data logs

      - name: Run EOD summary session
        if: steps.wait.outputs.proceed == 'true'
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:   https://paper-api.alpaca.markets
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN:           ${{ vars.DRY_RUN || 'false' }}
        run: python main.py --session eod_summary

      - name: Commit trade log and reports
        if: steps.wait.outputs.proceed == 'true'
        shell: bash
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading.local"
          mkdir -p /tmp/botstate
          for f in data/trades.db data/live_feed.json; do
            [ -f "$f" ] && cp "$f" "/tmp/botstate/$(basename "$f")"
          done
          if [ -d reports ]; then cp -r reports /tmp/botstate/reports; fi
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for f in data/trades.db data/live_feed.json; do
              b="/tmp/botstate/$(basename "$f")"
              [ -f "$b" ] && cp "$b" "$f"
            done
            if [ -d /tmp/botstate/reports ]; then cp -r /tmp/botstate/reports .; fi
            git add data/trades.db data/live_feed.json || true
            git add reports/*.html 2>/dev/null || true
            if git diff --staged --quiet; then echo "No changes."; exit 0; fi
            git commit -m "bot: eod_summary trade log + daily report [skip ci]"
            if git push origin HEAD:main; then echo "Pushed."; exit 0; fi
            echo "Push failed — retry $i"; sleep $(( i * 5 ))
          done
          echo "::error::Failed to push EOD state after 5 attempts"
          exit 1
