name: Trading Day (split sessions, waits in-job)

# GitHub kills hosted jobs at 6 hours, so a single 9:30→16:00 session is
# impossible. The day is split into two runs; main.py enforces its own
# runtime budget (SESSION_MAX_RUNTIME_MIN) and exits cleanly so the commit
# step always runs. GTC bracket orders protect positions between sessions.
#
#   morning:   10:43 UTC = 06:43 ET (EDT) — bot waits internally until 09:30
#   afternoon: 17:07 UTC = 13:07 ET (EDT) — picks up until the 16:00 close
#
# No "skip if late" gate: a delayed run still trades the rest of the day,
# which beats not trading at all. The loop itself exits at 16:00 ET.
on:
  schedule:
    - cron: "43 10 * * 1-5"
    - cron: "7 17 * * 1-5"
  workflow_dispatch:

concurrency:
  group: trading-day
  cancel-in-progress: false

jobs:
  trading_day:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt', 'punkt_tab', 'averaged_perceptron_tagger', 'averaged_perceptron_tagger_eng']:
              try: nltk.download(pkg, quiet=True)
              except: pass
          "

      - name: Create data directory
        run: mkdir -p data logs

      - name: Dispatcher gate
        id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # With the external dispatcher enabled (vars.EXTERNAL_DISPATCHER), it
          # fires workflow_dispatch at the exact session start and this
          # scheduled run becomes the fallback. Disabled (default): proceed
          # immediately — main.py waits for the 09:30 open internally.
          if [ "${{ github.event_name }}" != "schedule" ] \
             || [ "${{ vars.EXTERNAL_DISPATCHER || 'false' }}" != "true" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          WF=$(basename "${GITHUB_WORKFLOW_REF%%@*}")
          check_dispatched() {
            gh api -X GET "repos/${GITHUB_REPOSITORY}/actions/workflows/${WF}/runs" \
              -f event=workflow_dispatch -f "created=>=$1" \
              --jq '.total_count' 2>/dev/null || echo 0
          }
          if [ "${{ github.event.schedule }}" = "7 17 * * 1-5" ]; then
            # Afternoon slot (13:07 ET): skip only if a dispatched run took it
            # in the last 20 min (a 09:30 morning dispatch must not suppress us)
            SINCE=$(date -u -d '20 minutes ago' +%Y-%m-%dT%H:%M:%SZ)
            if [ "$(check_dispatched "$SINCE")" -gt 0 ]; then
              echo "Dispatched run owns the afternoon slot — bowing out."
              echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
            fi
            echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Morning slot: hold until 09:35 ET, bow out the moment the
          # dispatcher's 09:30 run appears, else proceed as the fallback.
          SINCE=$(date -u -d 'TZ="America/New_York" today 09:25' +%Y-%m-%dT%H:%M:%SZ)
          DEADLINE=$(( 9 * 60 + 35 ))
          while :; do
            H=$(TZ=America/New_York date +%-H); M=$(TZ=America/New_York date +%-M)
            NOW=$(( H * 60 + M ))
            if [ "$NOW" -ge $(( 9 * 60 + 28 )) ]; then
              if [ "$(check_dispatched "$SINCE")" -gt 0 ]; then
                echo "Dispatched run owns the morning slot — bowing out."
                echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
              fi
              if [ "$NOW" -ge "$DEADLINE" ]; then
                echo "No dispatched run by 09:35 ET — proceeding as fallback."
                echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
              fi
            fi
            sleep 60
          done

      - name: Run continuous session
        if: steps.gate.outputs.proceed == 'true'
        env:
          ALPACA_API_KEY:          ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:       ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:         https://paper-api.alpaca.markets
          NEWS_API_KEY:            ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN:                 ${{ vars.DRY_RUN || 'false' }}
          USE_CLAUDE:              ${{ vars.USE_CLAUDE || 'false' }}
          BACKTEST_PARITY:         ${{ vars.BACKTEST_PARITY || 'true' }}
          SESSION_MAX_RUNTIME_MIN: "310"
        run: python main.py --session continuous

      - name: Commit trade log
        if: always()
        shell: bash
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading.local"
          mkdir -p /tmp/botstate
          for f in discovered_tickers.json data/trades.db data/live_feed.json; do
            [ -f "$f" ] && cp "$f" "/tmp/botstate/$(basename "$f")"
          done
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            for f in discovered_tickers.json data/trades.db data/live_feed.json; do
              b="/tmp/botstate/$(basename "$f")"
              [ -f "$b" ] && cp "$b" "$f"
            done
            git add discovered_tickers.json data/trades.db data/live_feed.json || true
            if git diff --staged --quiet; then echo "No changes."; exit 0; fi
            git commit -m "bot: trading_day trade log [skip ci]"
            if git push origin HEAD:main; then echo "Pushed."; exit 0; fi
            echo "Push failed — retry $i"; sleep $(( i * 5 ))
          done
          echo "::error::Failed to push trading_day state after 5 attempts"
          exit 1
