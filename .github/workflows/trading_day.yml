name: Trading Day (09:15 ET, DST-safe)

on:
  schedule:
    - cron: "15 13 * * 1-5"   # 09:15 ET during EDT (UTC-4) — job warm before 9:30 open
    - cron: "15 14 * * 1-5"   # 09:15 ET during EST (UTC-5)
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual/dispatch run — proceeding regardless of time."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TARGET_MIN=555        # 09:15 America/New_York (minutes since midnight)
          TOLERANCE=55          # tolerate up to 55 min GitHub delay; still rejects wrong-season cron (60 min off)
          H=$(TZ=America/New_York date +%-H)
          M=$(TZ=America/New_York date +%-M)
          NOW_MIN=$(( H * 60 + M ))
          DIFF=$(( NOW_MIN - TARGET_MIN ))
          printf 'Eastern now %02d:%02d | diff %d min | tolerance %d\n' "$H" "$M" "$DIFF" "$TOLERANCE"
          if [ "$DIFF" -ge 0 ] && [ "$DIFF" -le "$TOLERANCE" ]; then
            echo "In window — proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Out of window (wrong-season cron or delayed beyond tolerance) — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  trading_day:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 390        # 6.5 hours covers full trading day

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "
          import nltk
          for pkg in ['punkt', 'punkt_tab', 'averaged_perceptron_tagger', 'averaged_perceptron_tagger_eng']:
              try: nltk.download(pkg, quiet=True)
              except: pass
          "

      - name: Create data directory
        run: mkdir -p data logs

      - name: Run all-day continuous session
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:   https://paper-api.alpaca.markets
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN:           ${{ vars.DRY_RUN || 'false' }}
        run: python main.py --session continuous

      - name: Commit trade log
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@trading.local"
          git pull --rebase origin main || true
          git add data/trades.db data/live_feed.json || true
          git diff --staged --quiet || git commit -m "bot: trading_day trade log [skip ci]"
          git push || true
